name: Build VS Code Extension

on:
  workflow_dispatch:
  push:
    paths:
      - 'antimatter_extension/**'
    branches:
      - main

jobs:
  build:
    name: Build & Package VSIX
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./antimatter_extension

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./antimatter_extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Extension
        run: npm run build

      - name: Package VSIX
        run: npx vsce package --allow-missing-repository --allow-star-activation

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: antimatter-bridge-extension
          path: ./antimatter_extension/*.vsix
          retention-days: 14
