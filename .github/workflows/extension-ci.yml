name: Extension CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: extension/package-lock.json

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: extension/node_modules
        key: ${{ runner.os }}-node-${{ hashFiles('extension/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-

    - name: Install dependencies
      run: cd extension && npm ci

    - name: Lint
      run: cd extension && npm run lint

    - name: Test
      run: cd extension && npm run test

    - name: Build
      run: cd extension && npm run build --if-present

    - name: Package VSIX
      run: |
        cd extension
        npm run package
    
    - name: Upload VSIX
      uses: actions/upload-artifact@v4
      with:
        name: extension-vsix
        path: extension/*.vsix
